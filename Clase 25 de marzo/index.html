<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
 <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
  <body>
    <h1>Hello, world!</h1>
    <div class="p-3 mb-2 bg-primary text-white col-6"><i class="bi bi-star-fill pe-2"></i>Colores <i class="bi bi-arrow-right"></i></div>
    <div class="p-3 mb-2 bg-primary-subtle text-body text-primary-emphasis col-3"><i class="bi bi-star-fill pe-2"></i>Colores <i class="bi bi-arrow-right"></i></div>
   

    <div class="p-2 mx-auto my-2 bg-success-subtle text-body text-success-emphasis text-center border border-success-subtle" style="width: 200px;">Texto centrado horizontal</div>
    <div style="grid-template-columns: 1fr 1fr 1fr 1fr;" class="d-grid gap-3 col-6 mx-auto my-2">
  <div class="p-2 bg-primary">Grid item 1</div>
  <div class="p-2 bg-success">Grid item 2</div>
  <div class="p-2 bg-danger">Grid item 3</div>
  <div class="p-2 bg-warning">Grid item 4</div>
</div>

<section class="mx-auto my-2 col-6 shadow p-3 mb-5 bg-body rounded p-3 mb-2 bg-body text-dark border border-secondary-subtle rounded-3">
    <form>
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Email address</label>
    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
    <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
  </div>
  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">Password</label>
    <input type="password" class="form-control" id="exampleInputPassword1">
  </div>
  <div class="mb-3 form-check">
    <input type="checkbox" class="form-check-input" id="exampleCheck1">
    <label class="form-check-label" for="exampleCheck1">Check me out</label>
  </div>
  <button type="submit" class="btn btn-primary">Submit</button>
</form>
</section>

<section class="my-5">
    <div id="carouselExample" class="carousel slide">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="..." class="d-block w-100" alt="...">
    </div>
    <div class="carousel-item">
      <img src="..." class="d-block w-100" alt="...">
    </div>
    <div class="carousel-item">
      <img src="..." class="d-block w-100" alt="...">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>
</section>

 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
